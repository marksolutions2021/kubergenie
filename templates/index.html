<!DOCTYPE html>
<html>
<head>
    <title>KuberGenie AI Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:Segoe UI,sans-serif;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:auto;
            padding:40px 0;
        }

        h1{
            text-align:center;
            font-size:48px;
            color:#fbbf24;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#94a3b8;
            margin-bottom:50px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:25px;
        }

        .card{
            background:#1e293b;
            border-radius:20px;
            padding:30px;
            box-shadow:0 0 20px rgba(0,0,0,.3);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        h2{
            color:#fbbf24;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#334155;
            color:white;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#10b981;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#059669;
        }

        .leaderboard-btn{
            background:#2563eb;
        }

        .leaderboard-btn:hover{
            background:#1d4ed8;
        }

        .result{
            margin-top:40px;
            background:#1e293b;
            padding:25px;
            border-radius:20px;
            white-space:pre-wrap;
            line-height:1.8;
        }

        @media(max-width:768px){
            h1{
                font-size:34px;
            }
        }

    </style>
</head>
<body>

<div class="container">

<h1>🔮 KuberGenie AI</h1>

<div class="subtitle">
AI-Powered Stock Intelligence Dashboard
</div>

<div class="grid">

<div class="card">

<h2>📈 Analyze Stock</h2>

<form action="/analyze" method="post">

<input type="text"
name="symbol"
placeholder="WIPRO.NS"
required>

<button type="submit">
Analyze Now
</button>

</form>

</div>

<div class="card">

<h2>🔮 Run Full Pipeline</h2>

<form action="/run_pipeline" method="post">

<button>
Run Genie Pipeline
</button>

</form>

</div>

<div class="card">

<h2>🎯 Accuracy Chart</h2>

<input type="text"
id="stockInput"
placeholder="WIPRO.NS">

<button onclick="goToChart()">
View Chart
</button>

</div>

<div class="card">

<h2>🏆 Leaderboard</h2>

<a href="/leaderboard">

<button class="leaderboard-btn">
Open Leaderboard
</button>

</a>

</div>

</div>

{% if result %}
<div class="result">
{{ result }}
</div>
{% endif %}

</div>

<script>

function goToChart()
{
    let stock=document.getElementById("stockInput").value.toUpperCase();

    if(stock)
    {
        window.location.href="/accuracy_chart/"+stock;
    }
}

</script>

</body>
</html>
